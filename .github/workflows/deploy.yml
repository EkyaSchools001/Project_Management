name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
      - name: Deploy to ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying frontend to ${{ github.event.inputs.environment }}"
          # Add your deployment commands here
          # Examples: AWS S3, Vercel, Netlify, etc.

  deploy-backend:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      - name: Generate Prisma client
        working-directory: ./server
        run: npx prisma generate
      - name: Build backend
        working-directory: ./server
        run: npm run build
      - name: Deploy to ${{ github.event.inputs.environment }}
        run: |
          echo "Deploying backend to ${{ github.event.inputs.environment }}"
          # Add your deployment commands here
          # Examples: Docker, AWS ECS, Railway, etc.

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          echo "Deployment completed with status: ${{ needs.deploy-frontend.result }} and ${{ needs.deploy-backend.result }}"
          # Add notification integration (Slack, Discord, etc.)