name: 🚀 Deploy SchoolOS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to deploy?'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend-only
          - backend-only

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Deploy Frontend → S3 + CloudFront
  # ─────────────────────────────────────────
  deploy-frontend:
    name: 🌐 Deploy Frontend (S3 + CloudFront)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'frontend-only'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🔧 Create production .env
        working-directory: ./frontend
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production
          echo "VITE_APP_ENV=production" >> .env.production

      - name: 🏗️ Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          NODE_ENV: production

      - name: 📁 List build output
        run: ls -la frontend/dist/

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🪣 Upload to S3
        run: |
          # Upload all files except index.html
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

          # Upload index.html with no-cache (always fresh)
          aws s3 cp frontend/dist/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: 🔄 Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: ✅ Frontend deployed
        run: echo "Frontend deployed successfully to https://${{ secrets.CLOUDFRONT_DOMAIN }}"


  # ─────────────────────────────────────────
  # JOB 2: Deploy Backend → EC2 via SSH
  # ─────────────────────────────────────────
  deploy-backend:
    name: ⚙️ Deploy Backend (EC2)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.target == 'all' ||
      github.event.inputs.target == 'backend-only'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/schoolos.pem
          chmod 600 ~/.ssh/schoolos.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to EC2
        run: |
          ssh -i ~/.ssh/schoolos.pem -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "📂 Navigating to project directory..."
            cd /home/ubuntu/schoolos

            echo "⬇️ Pulling latest code from master..."
            git pull origin master

            echo "📦 Installing backend dependencies..."
            cd server
            npm ci --only=production

            echo "🔧 Generating Prisma client..."
            npx prisma generate

            echo "🗄️ Applying database schema changes..."
            npx prisma db push --accept-data-loss

            echo "♻️ Restarting backend with PM2..."
            pm2 restart schoolos-backend --update-env || \
              pm2 start "npx ts-node --transpile-only src/server.ts" \
                --name schoolos-backend \
                --interpreter none

            pm2 save

            echo "✅ Backend deployment complete!"
            pm2 status
          ENDSSH

      - name: 🏥 Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ secrets.EC2_API_DOMAIN }}/api/health || echo "000")

          echo "Health check status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Health check returned $STATUS — check EC2 logs!"
            exit 1
          fi

          echo "✅ Backend is healthy!"

      - name: 🧹 Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/schoolos.pem


  # ─────────────────────────────────────────
  # JOB 3: Notify after both jobs
  # ─────────────────────────────────────────
  notify:
    name: 📣 Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()

    steps:
      - name: 📋 Deployment summary
        run: |
          echo "================================================"
          echo "  SchoolOS Deployment Summary"
          echo "================================================"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Triggered: ${{ github.actor }}"
          echo "  Frontend : ${{ needs.deploy-frontend.result }}"
          echo "  Backend  : ${{ needs.deploy-backend.result }}"
          echo "================================================"

      # Uncomment and configure to enable Slack notifications:
      # - name: 📲 Slack notification
      #   if: always()
      #   uses: slackapi/slack-github-action@v1
      #   with:
      #     payload: |
      #       {
      #         "text": "SchoolOS Deployment: Frontend=${{ needs.deploy-frontend.result }} | Backend=${{ needs.deploy-backend.result }}"
      #       }
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}